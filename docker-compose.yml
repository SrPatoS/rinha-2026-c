services:
  api1:
    image: srvini/rinha-2026-c:edge-prefix
    hostname: api1
    command: ["/bin/sh", "-c", "while true; do sleep 3600; done"]
    logging:
      driver: "none"
    deploy:
      resources:
        limits:
          cpus: "${API_CPUS:-0.01}"
          memory: "${API_MEMORY:-16MB}"

  api2:
    image: srvini/rinha-2026-c:edge-prefix
    hostname: api2
    command: ["/bin/sh", "-c", "while true; do sleep 3600; done"]
    logging:
      driver: "none"
    deploy:
      resources:
        limits:
          cpus: "${API_CPUS:-0.01}"
          memory: "${API_MEMORY:-16MB}"

  lb:
    image: srvini/rinha-2026-c:edge-prefix
    command: ["/app/rinha-lb"]
    logging:
      driver: "none"
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    environment:
      PORT: "9999"
    ports:
      - "9999:9999"
    depends_on:
      - api1
      - api2
    deploy:
      resources:
        limits:
          cpus: "${LB_CPUS:-0.98}"
          memory: "${LB_MEMORY:-50MB}"

networks:
  default:
    driver: bridge

volumes:
  sockets:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: size=10m
