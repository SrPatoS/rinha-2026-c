services:
  api1:
    image: srvini/rinha-2026-c:edge-ofast-pool
    hostname: api1
    logging:
      driver: "none"
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    environment:
      RINHA_FD_SOCKET: /sockets/api1.sock
      CANDIDATE_LIMIT: "${CANDIDATE_LIMIT:-1500}"
      APPROVAL_THRESHOLD: "${APPROVAL_THRESHOLD:-0.6}"
      REFERENCES_PATH: /app/resources/references.idx
    volumes:
      - sockets:/sockets
    deploy:
      resources:
        limits:
          cpus: "${API_CPUS:-0.01}"
          memory: "${API_MEMORY:-150MB}"

  api2:
    image: srvini/rinha-2026-c:edge-ofast-pool
    hostname: api2
    logging:
      driver: "none"
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    environment:
      RINHA_FD_SOCKET: /sockets/api2.sock
      CANDIDATE_LIMIT: "${CANDIDATE_LIMIT:-1500}"
      APPROVAL_THRESHOLD: "${APPROVAL_THRESHOLD:-0.6}"
      REFERENCES_PATH: /app/resources/references.idx
    volumes:
      - sockets:/sockets
    deploy:
      resources:
        limits:
          cpus: "${API_CPUS:-0.01}"
          memory: "${API_MEMORY:-150MB}"

  lb:
    image: srvini/rinha-2026-c:edge-ofast-pool
    command: ["/app/rinha-lb"]
    logging:
      driver: "none"
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    environment:
      PORT: "9999"
    ports:
      - "9999:9999"
    depends_on:
      - api1
      - api2
    deploy:
      resources:
        limits:
          cpus: "${LB_CPUS:-0.98}"
          memory: "${LB_MEMORY:-50MB}"

networks:
  default:
    driver: bridge

volumes:
  sockets:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: size=10m
