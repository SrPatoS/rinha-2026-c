services:
  api1:
    image: srvini/rinha-2026-c:latest
    hostname: api1
    environment:
      PORT: "8080"
      WORKERS: "192"
      MAX_REFERENCES: "0"
      CANDIDATE_LIMIT: "3000"
      REFERENCES_PATH: /app/resources/references.bin
    deploy:
      resources:
        limits:
          cpus: "0.40"
          memory: "150MB"

  api2:
    image: srvini/rinha-2026-c:latest
    hostname: api2
    environment:
      PORT: "8080"
      WORKERS: "192"
      MAX_REFERENCES: "0"
      CANDIDATE_LIMIT: "3000"
      REFERENCES_PATH: /app/resources/references.bin
    deploy:
      resources:
        limits:
          cpus: "0.40"
          memory: "150MB"

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "9999:9999"
    depends_on:
      - api1
      - api2
    deploy:
      resources:
        limits:
          cpus: "0.20"
          memory: "50MB"

networks:
  default:
    driver: bridge
