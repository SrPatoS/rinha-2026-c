services:
  api1:
    image: srvini/rinha-2026-c:kdtree-idx
    hostname: api1
    environment:
      PORT: "8080"
      WORKERS: "${WORKERS:-20}"
      MAX_REFERENCES: "${MAX_REFERENCES:-0}"
      CANDIDATE_LIMIT: "${CANDIDATE_LIMIT:-1500}"
      APPROVAL_THRESHOLD: "${APPROVAL_THRESHOLD:-0.6}"
      REFERENCES_PATH: /app/resources/references.idx
    deploy:
      resources:
        limits:
          cpus: "${API_CPUS:-0.40}"
          memory: "${API_MEMORY:-150MB}"

  api2:
    image: srvini/rinha-2026-c:kdtree-idx
    hostname: api2
    environment:
      PORT: "8080"
      WORKERS: "${WORKERS:-20}"
      MAX_REFERENCES: "${MAX_REFERENCES:-0}"
      CANDIDATE_LIMIT: "${CANDIDATE_LIMIT:-1500}"
      APPROVAL_THRESHOLD: "${APPROVAL_THRESHOLD:-0.6}"
      REFERENCES_PATH: /app/resources/references.idx
    deploy:
      resources:
        limits:
          cpus: "${API_CPUS:-0.40}"
          memory: "${API_MEMORY:-150MB}"

  lb:
    image: srvini/rinha-2026-c:rust-lb
    command: ["/app/rinha-lb"]
    environment:
      PORT: "9999"
      BACKEND_POOL: "${BACKEND_POOL:-8}"
    ports:
      - "9999:9999"
    depends_on:
      - api1
      - api2
    deploy:
      resources:
        limits:
          cpus: "${LB_CPUS:-0.20}"
          memory: "${LB_MEMORY:-50MB}"

networks:
  default:
    driver: bridge
