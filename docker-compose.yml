services:
  api1:
    image: srvini/rinha-2026-c:latest
    hostname: api1
    environment:
      PORT: "8080"
      WORKERS: "${WORKERS:-16}"
      MAX_REFERENCES: "${MAX_REFERENCES:-0}"
      CANDIDATE_LIMIT: "${CANDIDATE_LIMIT:-5000}"
      REFERENCES_PATH: /app/resources/references.bin
    deploy:
      resources:
        limits:
          cpus: "${API_CPUS:-0.40}"
          memory: "${API_MEMORY:-150MB}"

  api2:
    image: srvini/rinha-2026-c:latest
    hostname: api2
    environment:
      PORT: "8080"
      WORKERS: "${WORKERS:-16}"
      MAX_REFERENCES: "${MAX_REFERENCES:-0}"
      CANDIDATE_LIMIT: "${CANDIDATE_LIMIT:-5000}"
      REFERENCES_PATH: /app/resources/references.bin
    deploy:
      resources:
        limits:
          cpus: "${API_CPUS:-0.40}"
          memory: "${API_MEMORY:-150MB}"

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "9999:9999"
    depends_on:
      - api1
      - api2
    deploy:
      resources:
        limits:
          cpus: "${NGINX_CPUS:-0.20}"
          memory: "${NGINX_MEMORY:-50MB}"

networks:
  default:
    driver: bridge
